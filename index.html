<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Task App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Saans SemiMono-TRIAL', -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
            background: #FFFCF4;
            min-height: 100vh;
            padding-bottom: 140px;
            position: relative;
            overflow-x: hidden;
        }

        /* Radial gradient at bottom */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #FB7B41, #FF9CFA, #BAB1EA, rgba(186, 177, 234, 0),#FFFCF4);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            z-index: 40;
        }
        
        .header-top { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .header-title { font-size: 40px; font-family: 'Tobias-TRIAL', Georgia, serif; color: #1e1e1e; font-weight: 200; letter-spacing: -0.5px;}
        .header-subtitle { color: #1e1e1e; font-size: 14px; }
        .header-time { text-align: right; font-size: 12px; color: #1e1e1e; }
        
        /* Header card container */
        .header-card {
            background: rgba(216, 207, 182, 0.4);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 240, 220, 0.6);
            border-radius: 24px;
            padding: 16px;
            margin-top: 8px;
            position: relative;
            z-index: 41;
        }
        
        .progress-container {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-bar {
            flex: 1;
            height: 20px;
            background: #D8CFB6;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #FB7B41 0%, #FF9CFA 50%, #BAB1EA 100%);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #8b7355;
            font-weight: 500;
            min-width: 80px;
            white-space: nowrap;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #D8CFB6;
            color: #1e1e1e;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: linear-gradient(90deg, #FB7B41, #FF9CFA, #BAB1EA);
            color: #FFFCF4;
        }

        /* Tag filter */
        .tag-filter {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 0;
        }

        .filter-tag {
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #D8CFB6;
            color: #1e1e1e;
            transition: all 0.2s;
        }

        .filter-tag.active {
            background: #FB7B41;
            color: white;
        }

        .filter-tag.active-home {
            background: #d4b5f0;
            color: #5a3a7a;
        }

        .filter-tag.active-misc {
            background: #f0b5d4;
            color: #7a3a5a;
        }
        
        .content {
            padding-top: 240px;
            padding-left: 20px;
            padding-right: 20px;
            position: relative;
            z-index: 10;
        }
        
        .task-item {
            background: #D8CFB6;
            border-radius: 160px;
            padding: 20px 20px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            touch-action: pan-y;
            cursor: grab;
            position: relative;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .task-item.swiped {
            border-color: #FB7B41;
        }
        
        .task-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dot-school { background: #FB7B41; }
        .dot-home { background: #d4b5f0; }
        .dot-misc { background: #f0b5d4; }
        
        .task-content { flex: 1; min-width: 0; }
        .task-name { color: #1e1e1e; font-weight: 500; font-size: 14px; }
        .task-notes { color: #1e1e1e; font-size: 12px; margin-top: 3px; opacity: 0.7; }
        
        .task-actions {
            margin-top: 12px;
            display: none;
            gap: 8px;
        }

        .task-item.swiped .task-actions {
            display: flex;
        }

        .btn-action {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reschedule {
            background: #FB7B41;
            color: white;
        }

        .btn-reschedule:active {
            opacity: 0.8;
        }
        
        .add-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffb8a8, #FB7B41);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(251, 123, 65, 0.4);
            z-index: 30;
            transition: all 0.2s;
        }

        .add-button:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: flex-end;
            z-index: 50;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            width: 100%;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 28px 24px;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .modal-title { font-size: 22px; font-family: 'Tobias-TRIAL', Georgia, serif; color: #1e1e1e; margin-bottom: 20px; font-weight: 200; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .form-input, .form-textarea { width: 100%; padding: 12px 16px; border-radius: 12px; background: #D8CFB6; border: none; color: #1e1e1e; font-family: inherit; }
        .form-textarea { height: 80px; resize: none; }
        
        .quick-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .quick-tag { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; background: #D8CFB6; color: #666; transition: all 0.2s; }
        .quick-tag.active-school { background: #FB7B41; color: white; }
        .quick-tag.active-home { background: #d4b5f0; color: #5a3a7a; }
        .quick-tag.active-misc { background: #f0b5d4; color: #7a3a5a; }
        
        .modal-buttons { display: flex; gap: 8px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px 16px; border: none; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .btn-cancel { background: #D8CFB6; color: #1e1e1e; }
        .btn-submit { background: linear-gradient(90deg, #FB7B41, #FF9CFA); color: white; }
        
        .empty { text-align: center; padding: 40px 20px; color: #999; }

        /* Reschedule modal */
        .quick-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .quick-option {
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #F0B5D4;
            color: #7a3a5a;
            transition: all 0.2s;
        }

        .quick-option:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div>
                <div class="header-title">Hey, Bel.</div>
                <div class="header-subtitle">Whatcha getting up to today?</div>
            </div>
            <div class="header-time">
                <div id="time">8:53 PM</div>
                <div id="date">03.04.26</div>
            </div>
        </div>
        
        <div class="header-card">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0/0 tasks done today</div>
            </div>

            <div class="tabs">
                <button class="tab" onclick="app.setView('scheduled')">SCHEDULED</button>
                <button class="tab active" onclick="app.setView('today')">TODAY</button>
                <button class="tab" onclick="app.setView('complete')">COMPLETE</button>
            </div>

            <div class="tag-filter" id="tagFilter"></div>
        </div>
    </div>
    
    <div class="content">
        <div id="taskList"></div>
    </div>
    
    <button class="add-button" onclick="app.openAddModal()">+</button>
    
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2 class="modal-title">✏️ New Task...</h2>
            <div class="form-group">
                <input type="text" id="taskName" class="form-input" placeholder="Task name">
            </div>
            <div class="form-group">
                <textarea id="taskNotes" class="form-textarea" placeholder="Add notes..."></textarea>
            </div>
            <div class="form-group">
                <div class="quick-tags" id="tagButtons"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Choose a date...</label>
                <input type="date" id="taskDate" class="form-input">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="app.closeAddModal()">Cancel</button>
                <button class="btn-submit" onclick="app.saveTask()">Add Task</button>
            </div>
        </div>
    </div>

    <div class="modal" id="rescheduleModal">
        <div class="modal-content">
            <h2 class="modal-title">Reschedule Task</h2>
            <div class="quick-options" id="quickOptions"></div>
            <div class="form-group">
                <label class="form-label">Choose a date...</label>
                <input type="date" id="rescheduleDate" class="form-input">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="app.closeRescheduleModal()">Cancel</button>
                <button class="btn-submit" onclick="app.confirmReschedule()">Reschedule</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            tasks: [],
            view: 'today',
            selectedTags: [],
            swipedTaskId: null,
            touchStartX: null,
            touchStartY: null,
            
            init() {
                this.loadTasks();
                this.updateTime();
                this.setupTagButtons();
                this.setupTagFilter();
                this.setupRescheduleOptions();
                setInterval(() => this.updateTime(), 1000);
                setInterval(() => this.render(), 5000);
                this.render();
            },
            
            loadTasks() {
                const saved = localStorage.getItem('tasks');
                this.tasks = saved ? JSON.parse(saved) : this.getDefaultTasks();
            },
            
            getDefaultTasks() {
                return [
                    { id: 1, name: 'Finish exhibition posters', notes: 'due Sunday', tags: ['school'], date: this.getToday(), completed: false },
                    { id: 2, name: 'Order exhibition decals for podium', notes: 'due Sunday', tags: ['school'], date: this.getToday(), completed: false },
                    { id: 3, name: 'Print Denman poster', notes: 'by Saturday', tags: ['school'], date: this.getToday(), completed: false },
                    { id: 4, name: 'PT exercises', notes: 'by tomorrow', tags: ['home'], date: this.getToday(), completed: false },
                ];
            },
            
            getToday() {
                return new Date().toISOString().split('T')[0];
            },
            
            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
                this.render();
            },
            
            setupTagButtons() {
                const container = document.getElementById('tagButtons');
                container.innerHTML = '';
                ['home', 'school', 'misc'].forEach(tag => {
                    const btn = document.createElement('button');
                    btn.className = 'quick-tag';
                    btn.textContent = tag;
                    btn.onclick = () => {
                        btn.classList.toggle(`active-${tag}`);
                    };
                    container.appendChild(btn);
                });
            },

            setupTagFilter() {
                const container = document.getElementById('tagFilter');
                container.innerHTML = '';
                const allTags = [...new Set(this.tasks.flatMap(t => t.tags || []))];
                
                allTags.forEach(tag => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-tag';
                    btn.textContent = tag;
                    btn.onclick = () => {
                        this.selectedTags = this.selectedTags.includes(tag)
                            ? this.selectedTags.filter(t => t !== tag)
                            : [...this.selectedTags, tag];
                        this.render();
                    };
                    container.appendChild(btn);
                });
            },

            setupRescheduleOptions() {
                const container = document.getElementById('quickOptions');
                container.innerHTML = '';
                const options = [
                    { label: 'Today', days: 0 },
                    { label: 'Tomorrow', days: 1 },
                    { label: 'This weekend', days: 6 },
                    { label: 'Next week', days: 7 },
                ];
                
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'quick-option';
                    btn.textContent = opt.label;
                    btn.onclick = () => {
                        const date = new Date();
                        date.setDate(date.getDate() + opt.days);
                        document.getElementById('rescheduleDate').value = date.toISOString().split('T')[0];
                    };
                    container.appendChild(btn);
                });
            },
            
            setView(view) {
                this.view = view;
                this.selectedTags = [];
                this.render();
                document.querySelectorAll('.tab').forEach((btn, i) => {
                    btn.classList.toggle('active', (i === 1 && view === 'today') || (i === 0 && view === 'scheduled') || (i === 2 && view === 'complete'));
                });
            },
            
            getFilteredTasks() {
                let tasks = this.tasks;

                if (this.view === 'today') {
                    tasks = tasks.filter(t => !t.completed && t.date === this.getToday());
                } else if (this.view === 'scheduled') {
                    tasks = tasks.filter(t => !t.completed && t.date > this.getToday());
                } else if (this.view === 'complete') {
                    tasks = tasks.filter(t => t.completed);
                }

                if (this.selectedTags.length > 0) {
                    tasks = tasks.filter(t => this.selectedTags.some(tag => t.tags?.includes(tag)));
                }

                return tasks;
            },
            
            completeTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = true;
                    this.saveTasks();
                }
            },

            openRescheduleModal(taskId) {
                this.swipedTaskId = taskId;
                const task = this.tasks.find(t => t.id === taskId);
                if (task) {
                    document.getElementById('rescheduleDate').value = task.date;
                    document.getElementById('rescheduleModal').classList.add('show');
                }
            },

            closeRescheduleModal() {
                document.getElementById('rescheduleModal').classList.remove('show');
                this.swipedTaskId = null;
                this.render();
            },

            confirmReschedule() {
                const newDate = document.getElementById('rescheduleDate').value;
                const task = this.tasks.find(t => t.id === this.swipedTaskId);
                if (task && newDate) {
                    task.date = newDate;
                    this.saveTasks();
                    this.closeRescheduleModal();
                }
            },
            
            openAddModal() {
                document.getElementById('addModal').classList.add('show');
                document.getElementById('taskDate').value = this.getToday();
            },
            
            closeAddModal() {
                document.getElementById('addModal').classList.remove('show');
            },
            
            saveTask() {
                const name = document.getElementById('taskName').value;
                const notes = document.getElementById('taskNotes').value;
                const date = document.getElementById('taskDate').value;
                const tags = Array.from(document.querySelectorAll('.quick-tag.active-school, .quick-tag.active-home, .quick-tag.active-misc'))
                    .map(btn => btn.textContent);
                
                if (name) {
                    this.tasks.push({
                        id: Date.now(),
                        name,
                        notes,
                        tags,
                        date,
                        completed: false
                    });
                    this.saveTasks();
                    this.setupTagFilter();
                    document.getElementById('taskName').value = '';
                    document.getElementById('taskNotes').value = '';
                    this.closeAddModal();
                }
            },
            
            updateTime() {
                const now = new Date();
                document.getElementById('time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('date').textContent = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' });
            },

            setupSwipeListeners() {
                const taskItems = document.querySelectorAll('.task-item');
                taskItems.forEach(item => {
                    let touchStartX = 0;
                    let touchStartY = 0;

                    item.addEventListener('touchstart', (e) => {
                        touchStartX = e.touches[0].clientX;
                        touchStartY = e.touches[0].clientY;
                    }, { passive: true });

                    item.addEventListener('touchend', (e) => {
                        const touchEndX = e.changedTouches[0].clientX;
                        const touchEndY = e.changedTouches[0].clientY;
                        const diffX = touchStartX - touchEndX;
                        const diffY = touchStartY - touchEndY;

                        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                            const taskId = parseInt(item.dataset.taskId);
                            
                            if (diffX > 0) {
                                // Swipe left - reschedule
                                this.openRescheduleModal(taskId);
                                item.classList.add('swiped');
                            } else {
                                // Swipe right - complete
                                this.completeTask(taskId);
                            }
                        }
                    }, { passive: true });
                });
            },
            
            render() {
                const tasks = this.getFilteredTasks();
                const list = document.getElementById('taskList');
                
                if (tasks.length === 0) {
                    list.innerHTML = '<div class="empty">No tasks</div>';
                } else {
                    list.innerHTML = tasks.map(task => {
                        const dotClass = task.tags?.[0] ? `dot-${task.tags[0]}` : 'dot-school';
                        return `
                            <div class="task-item" data-task-id="${task.id}">
                                <div class="task-dot ${dotClass}"></div>
                                <div class="task-content">
                                    <div class="task-name">${task.name}</div>
                                    ${task.notes ? `<div class="task-notes">${task.notes}</div>` : ''}
                                </div>
                                <div class="task-actions">
                                    <button class="btn-action btn-reschedule" onclick="app.openRescheduleModal(${task.id})">Reschedule</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                
                // Update progress
                const progress = this.tasks.filter(t => t.completed && t.date === this.getToday()).length;
                const total = this.tasks.filter(t => t.date === this.getToday()).length;
                document.getElementById('progressFill').style.width = total > 0 ? (progress / total * 100) + '%' : '0%';
                document.getElementById('progressText').textContent = `${progress}/${total} tasks done today`;

                // Update filter tags
                this.setupTagFilter();

                // Setup swipe listeners
                setTimeout(() => this.setupSwipeListeners(), 0);
            }
        };
        
        app.init();
    </script>
</body>
</html>
