<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Task App</title>
    <style>
        @font-face {
            font-family: 'Tobias';
            src: url('./fonts/Tobias-TRIAL-Light.woff2') format('woff2');
            font-weight: 200;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'SaansSemiMono';
            src: url('./fonts/SaansSemiMono-TRIAL-Light.woff2') format('woff2');
            font-weight: 200;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            touch-action: manipulation;
        }

        body { 
            font-family: 'SaansSemiMono', -apple-system, BlinkMacSystemFont, monospace;
            background: linear-gradient(180deg, #FFFCF4 0%, #F5E6D3 35%, #F3D5E8 65%, #F4A8A8 100%);
            min-height: 100vh;
            padding-bottom: 140px;
            position: relative;
            overflow-x: hidden;
        }

        /* Radial gradient at bottom */
        body::before {
            content: '';
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(251, 123, 65, 0.3), rgba(255, 156, 250, 0.2), rgba(186, 177, 234, 0.1), transparent);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            z-index: 40;
        }
        
        .header-top { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .header-title { font-size: 40px; font-family: 'Tobias', Georgia, serif; color: #1e1e1e; font-weight: 200; letter-spacing: -0.5px;}
        .header-subtitle { color: #1e1e1e; font-size: 14px; }
        .header-time { text-align: right; font-size: 12px; color: #1e1e1e; }
        
        /* Header card container */
        .header-card {
            background: rgba(216, 207, 182, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 240, 220, 0.6);
            border-radius: 24px;
            padding: 16px;
            margin-top: 8px;
            position: relative;
            z-index: 41;
        }
        
        .progress-container {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
        }

        .progress-bar {
            flex: 1;
            height: 20px;
            background: #D8CFB6;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 8px;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #FB7B41 0%, #FF9CFA 50%, #BAB1EA 100%);
            transition: width 0.3s ease;
            min-width: 0;
        }

        .progress-text {
            font-size: 11px;
            color: #F5E6D3;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #D8CFB6;
            color: #1e1e1e;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: linear-gradient(90deg, #FB7B41, #FF9CFA, #BAB1EA);
            color: #FFFCF4;
        }

        /* Tag filter */
        .tag-filter {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 0;
        }

        .filter-tag {
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #D8CFB6;
            color: #1e1e1e;
            transition: all 0.2s;
        }

        .filter-tag.active {
            background: #FB7B41;
            color: white;
        }

        .filter-tag.active-home {
            background: #d4b5f0;
            color: #5a3a7a;
        }

        .filter-tag.active-misc {
            background: #f0b5d4;
            color: #7a3a5a;
        }

        /* Sort controls */
        .sort-controls {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 0.5px solid rgba(255, 240, 220, 0.4);
        }

        .sort-btn {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #D8CFB6;
            color: #1e1e1e;
            transition: all 0.2s;
        }

        .sort-btn.active {
            background: #FB7B41;
            color: white;
        }
        
        .content {
            padding-top: 240px;
            padding-left: 20px;
            padding-right: 20px;
            position: relative;
            z-index: 10;
        }
        
        .task-item {
            background: #D8CFB6;
            border-radius: 160px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            touch-action: pan-y;
            cursor: grab;
            position: relative;
            transition: all 0.2s;
            border: 2px solid transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .task-item.swiped {
            border-color: #FB7B41;
        }

        .task-item.dragging {
            opacity: 0.7;
            transform: scale(0.98);
        }
        
        .task-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            cursor: grab;
            transition: all 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        .dot-school { background: #FB7B41; }
        .dot-home { background: #d4b5f0; }
        .dot-misc { background: #f0b5d4; }
        
        .task-content { flex: 1; min-width: 0; }
        .task-name { color: #1e1e1e; font-weight: 500; font-size: 14px; }
        .task-notes { color: #1e1e1e; font-size: 12px; margin-top: 3px; opacity: 0.7; }
        
        .task-actions {
            margin-top: 12px;
            display: none;
            gap: 8px;
        }

        .task-item.swiped .task-actions {
            display: flex;
        }

        .btn-action {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reschedule {
            background: #FB7B41;
            color: white;
        }

        .btn-reschedule:active {
            opacity: 0.8;
        }

        .drag-handle {
            cursor: grab;
            color: #8b7355;
            font-weight: bold;
            font-size: 20px;
            padding: 0 4px;
            -webkit-user-select: none;
            user-select: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }
        
        .add-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 40% 40%, #ffb8a8, #FB7B41);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(251, 123, 65, 0.4);
            z-index: 30;
            transition: all 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        .add-button:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: flex-end;
            z-index: 50;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            width: 100%;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 28px 24px;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .modal-title { font-size: 22px; font-family: 'Tobias', Georgia, serif; color: #1e1e1e; margin-bottom: 20px; font-weight: 200; }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #888;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
        }
        
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .form-input, .form-textarea { 
            width: 100%; 
            padding: 12px 16px; 
            border-radius: 12px; 
            background: #D8CFB6; 
            border: none; 
            color: #1e1e1e; 
            font-family: inherit;
            -webkit-user-select: text;
            user-select: text;
        }
        .form-textarea { height: 80px; resize: none; }
        
        .quick-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .quick-tag { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; background: #D8CFB6; color: #666; transition: all 0.2s; }
        .quick-tag.active-school { background: #FB7B41; color: white; }
        .quick-tag.active-home { background: #d4b5f0; color: #5a3a7a; }
        .quick-tag.active-misc { background: #f0b5d4; color: #7a3a5a; }
        
        .modal-buttons { display: flex; gap: 8px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px 16px; border: none; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .btn-cancel { background: #D8CFB6; color: #1e1e1e; }
        .btn-submit { background: linear-gradient(90deg, #FB7B41, #FF9CFA); color: white; }
        .btn-delete { background: #f5a5a5; color: #8a3a3a; }
        
        .empty { text-align: center; padding: 40px 20px; color: #999; }

        /* Reschedule modal */
        .quick-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .quick-option {
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #F0B5D4;
            color: #7a3a5a;
            transition: all 0.2s;
        }

        .quick-option:active {
            opacity: 0.8;
        }

        .details-section {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 0.5px solid #e0e0e0;
        }

        .details-label {
            font-size: 11px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .details-content {
            font-size: 14px;
            color: #1e1e1e;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div>
                <div class="header-title">Hey, Bel.</div>
                <div class="header-subtitle">Whatcha getting up to today?</div>
            </div>
            <div class="header-time">
                <div id="time">8:53 PM</div>
                <div id="date">03.04.26</div>
            </div>
        </div>
        
        <div class="header-card">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    <div class="progress-text" id="progressText">0/0</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab" onclick="app.setView('scheduled')">SCHEDULED</button>
                <button class="tab active" onclick="app.setView('today')">TODAY</button>
                <button class="tab" onclick="app.setView('complete')">COMPLETE</button>
            </div>

            <div class="tag-filter" id="tagFilter"></div>

            <div class="sort-controls">
                <button class="sort-btn" onclick="app.toggleSort('manual')">SORT</button>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div id="taskList"></div>
    </div>
    
    <button class="add-button" onclick="app.openAddModal()">+</button>
    
    <!-- Add Task Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">✏️ New Task...</h2>
                <button class="modal-close" onclick="app.closeAddModal()">✕</button>
            </div>
            <div class="form-group">
                <input type="text" id="taskName" class="form-input" placeholder="Task name">
            </div>
            <div class="form-group">
                <textarea id="taskNotes" class="form-textarea" placeholder="Add notes..."></textarea>
            </div>
            <div class="form-group">
                <div class="quick-tags" id="tagButtons"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Choose a date...</label>
                <input type="date" id="taskDate" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Set a reminder?</label>
                <input type="datetime-local" id="taskReminder" class="form-input">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="app.closeAddModal()">Cancel</button>
                <button class="btn-submit" onclick="app.saveTask()">Add Task</button>
            </div>
        </div>
    </div>

    <!-- Task Details Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="detailsTitle">Task Details</h2>
                <button class="modal-close" onclick="app.closeDetailsModal()">✕</button>
            </div>

            <div class="form-group">
                <label class="form-label">Task Name</label>
                <input type="text" id="detailsName" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Notes</label>
                <textarea id="detailsNotes" class="form-textarea"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Tags</label>
                <div class="quick-tags" id="detailsTags"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" id="detailsDate" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Reminder</label>
                <input type="datetime-local" id="detailsReminder" class="form-input">
            </div>

            <div class="modal-buttons">
                <button class="btn-delete" onclick="app.deleteCurrentTask()">Delete</button>
                <button class="btn-cancel" onclick="app.closeDetailsModal()">Cancel</button>
                <button class="btn-submit" onclick="app.saveTaskDetails()">Save</button>
            </div>
        </div>
    </div>

    <!-- Reschedule Modal -->
    <div class="modal" id="rescheduleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Reschedule Task</h2>
                <button class="modal-close" onclick="app.closeRescheduleModal()">✕</button>
            </div>
            <div class="quick-options" id="quickOptions"></div>
            <div class="form-group">
                <label class="form-label">Choose a date...</label>
                <input type="date" id="rescheduleDate" class="form-input">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="app.closeRescheduleModal()">Cancel</button>
                <button class="btn-submit" onclick="app.confirmReschedule()">Reschedule</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            tasks: [],
            view: 'today',
            selectedTags: [],
            swipedTaskId: null,
            currentTaskId: null,
            sortMode: false,
            draggedTaskId: null,
            touchStartX: 0,
            touchStartY: 0,
            longPressTimer: null,
            
            init() {
                this.loadTasks();
                this.updateTime();
                this.setupTagButtons();
                this.setupTagFilter();
                this.setupRescheduleOptions();
                this.setupDetailsTags();
                setInterval(() => this.updateTime(), 1000);
                setInterval(() => this.render(), 5000);
                this.render();
            },
            
            loadTasks() {
                const saved = localStorage.getItem('tasks');
                this.tasks = saved ? JSON.parse(saved) : this.getDefaultTasks();
            },
            
            getDefaultTasks() {
                return [
                    { id: 1, name: 'Finish exhibition posters', notes: 'due Sunday', tags: ['school'], date: this.getToday(), completed: false, reminder: '', order: 0 },
                    { id: 2, name: 'Order exhibition decals for podium', notes: 'due Sunday', tags: ['school'], date: this.getToday(), completed: false, reminder: '', order: 1 },
                    { id: 3, name: 'Print Denman poster', notes: 'by Saturday', tags: ['school'], date: this.getToday(), completed: false, reminder: '', order: 2 },
                    { id: 4, name: 'PT exercises', notes: 'by tomorrow', tags: ['home'], date: this.getToday(), completed: false, reminder: '', order: 3 },
                ];
            },
            
            getToday() {
                return new Date().toISOString().split('T')[0];
            },
            
            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
                this.render();
            },
            
            setupTagButtons() {
                const container = document.getElementById('tagButtons');
                container.innerHTML = '';
                ['home', 'school', 'misc'].forEach(tag => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'quick-tag';
                    btn.textContent = tag;
                    btn.onclick = () => {
                        btn.classList.toggle(`active-${tag}`);
                    };
                    container.appendChild(btn);
                });
            },

            setupDetailsTags() {
                const container = document.getElementById('detailsTags');
                container.innerHTML = '';
                ['home', 'school', 'misc'].forEach(tag => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'quick-tag';
                    btn.textContent = tag;
                    btn.dataset.tag = tag;
                    btn.onclick = () => {
                        btn.classList.toggle(`active-${tag}`);
                    };
                    container.appendChild(btn);
                });
            },

            setupTagFilter() {
                const container = document.getElementById('tagFilter');
                container.innerHTML = '';
                const allTags = [...new Set(this.tasks.flatMap(t => t.tags || []))];
                
                allTags.forEach(tag => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'filter-tag';
                    btn.textContent = tag;
                    btn.onclick = () => {
                        this.selectedTags = this.selectedTags.includes(tag)
                            ? this.selectedTags.filter(t => t !== tag)
                            : [...this.selectedTags, tag];
                        this.render();
                    };
                    container.appendChild(btn);
                });
            },

            setupRescheduleOptions() {
                const container = document.getElementById('quickOptions');
                container.innerHTML = '';
                const options = [
                    { label: 'Today', days: 0 },
                    { label: 'Tomorrow', days: 1 },
                    { label: 'This weekend', days: 6 },
                    { label: 'Next week', days: 7 },
                ];
                
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'quick-option';
                    btn.textContent = opt.label;
                    btn.onclick = () => {
                        const date = new Date();
                        date.setDate(date.getDate() + opt.days);
                        document.getElementById('rescheduleDate').value = date.toISOString().split('T')[0];
                    };
                    container.appendChild(btn);
                });
            },
            
            setView(view) {
                this.view = view;
                this.selectedTags = [];
                this.render();
                document.querySelectorAll('.tab').forEach((btn, i) => {
                    btn.classList.toggle('active', (i === 1 && view === 'today') || (i === 0 && view === 'scheduled') || (i === 2 && view === 'complete'));
                });
            },

            toggleSort(mode) {
                this.sortMode = !this.sortMode;
                document.querySelector('.sort-btn').classList.toggle('active', this.sortMode);
                this.render();
            },
            
            getFilteredTasks() {
                let tasks = this.tasks;

                if (this.view === 'today') {
                    tasks = tasks.filter(t => !t.completed && t.date === this.getToday());
                } else if (this.view === 'scheduled') {
                    tasks = tasks.filter(t => !t.completed && t.date > this.getToday());
                } else if (this.view === 'complete') {
                    tasks = tasks.filter(t => t.completed);
                }

                if (this.selectedTags.length > 0) {
                    tasks = tasks.filter(t => this.selectedTags.some(tag => t.tags?.includes(tag)));
                }

                // Sort by order if manual sort is enabled
                if (this.sortMode && this.view === 'today') {
                    tasks.sort((a, b) => (a.order || 0) - (b.order || 0));
                }

                return tasks;
            },
            
            completeTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = true;
                    this.saveTasks();
                }
            },

            openRescheduleModal(taskId) {
                this.swipedTaskId = taskId;
                const task = this.tasks.find(t => t.id === taskId);
                if (task) {
                    document.getElementById('rescheduleDate').value = task.date;
                    document.getElementById('rescheduleModal').classList.add('show');
                }
            },

            closeRescheduleModal() {
                document.getElementById('rescheduleModal').classList.remove('show');
                this.swipedTaskId = null;
                this.render();
            },

            confirmReschedule() {
                const newDate = document.getElementById('rescheduleDate').value;
                const task = this.tasks.find(t => t.id === this.swipedTaskId);
                if (task && newDate) {
                    task.date = newDate;
                    this.saveTasks();
                    this.closeRescheduleModal();
                }
            },

            openDetailsModal(taskId) {
                this.currentTaskId = taskId;
                const task = this.tasks.find(t => t.id === taskId);
                if (!task) return;

                document.getElementById('detailsTitle').textContent = task.name;
                document.getElementById('detailsName').value = task.name;
                document.getElementById('detailsNotes').value = task.notes || '';
                document.getElementById('detailsDate').value = task.date;
                document.getElementById('detailsReminder').value = task.reminder || '';

                // Set tags
                document.querySelectorAll('#detailsTags .quick-tag').forEach(btn => {
                    const tag = btn.dataset.tag;
                    btn.classList.remove(`active-${tag}`);
                    if (task.tags?.includes(tag)) {
                        btn.classList.add(`active-${tag}`);
                    }
                });

                document.getElementById('detailsModal').classList.add('show');
            },

            closeDetailsModal() {
                document.getElementById('detailsModal').classList.remove('show');
                this.currentTaskId = null;
            },

            saveTaskDetails() {
                const task = this.tasks.find(t => t.id === this.currentTaskId);
                if (!task) return;

                task.name = document.getElementById('detailsName').value;
                task.notes = document.getElementById('detailsNotes').value;
                task.date = document.getElementById('detailsDate').value;
                task.reminder = document.getElementById('detailsReminder').value;
                task.tags = Array.from(document.querySelectorAll('#detailsTags .quick-tag.active-school, #detailsTags .quick-tag.active-home, #detailsTags .quick-tag.active-misc'))
                    .map(btn => btn.dataset.tag);

                this.saveTasks();
                this.closeDetailsModal();
            },

            deleteCurrentTask() {
                if (confirm('Delete this task?')) {
                    this.tasks = this.tasks.filter(t => t.id !== this.currentTaskId);
                    this.saveTasks();
                    this.closeDetailsModal();
                }
            },
            
            openAddModal() {
                document.getElementById('addModal').classList.add('show');
                document.getElementById('taskDate').value = this.getToday();
            },
            
            closeAddModal() {
                document.getElementById('addModal').classList.remove('show');
            },
            
            saveTask() {
                const name = document.getElementById('taskName').value;
                const notes = document.getElementById('taskNotes').value;
                const date = document.getElementById('taskDate').value;
                const reminder = document.getElementById('taskReminder').value;
                const tags = Array.from(document.querySelectorAll('#tagButtons .quick-tag.active-school, #tagButtons .quick-tag.active-home, #tagButtons .quick-tag.active-misc'))
                    .map(btn => btn.textContent);
                
                if (name) {
                    const maxOrder = Math.max(0, ...this.tasks.map(t => t.order || 0));
                    this.tasks.push({
                        id: Date.now(),
                        name,
                        notes,
                        tags,
                        date,
                        reminder,
                        completed: false,
                        order: maxOrder + 1
                    });
                    this.saveTasks();
                    this.setupTagFilter();
                    this.setupTagButtons();
                    document.getElementById('taskName').value = '';
                    document.getElementById('taskNotes').value = '';
                    document.getElementById('taskReminder').value = '';
                    this.closeAddModal();
                }
            },
            
            updateTime() {
                const now = new Date();
                document.getElementById('time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('date').textContent = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' });
            },

            setupSwipeListeners() {
                const taskItems = document.querySelectorAll('.task-item');
                taskItems.forEach(item => {
                    let touchStartX = 0;
                    let touchStartY = 0;
                    let isSwiping = false;

                    item.addEventListener('touchstart', (e) => {
                        touchStartX = e.touches[0].clientX;
                        touchStartY = e.touches[0].clientY;
                        isSwiping = false;
                    }, { passive: true });

                    item.addEventListener('touchend', (e) => {
                        const touchEndX = e.changedTouches[0].clientX;
                        const touchEndY = e.changedTouches[0].clientY;
                        const diffX = touchStartX - touchEndX;
                        const diffY = touchStartY - touchEndY;

                        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                            isSwiping = true;
                            const taskId = parseInt(item.dataset.taskId);
                            
                            if (diffX > 0) {
                                // Swipe left - reschedule
                                this.openRescheduleModal(taskId);
                                item.classList.add('swiped');
                            } else {
                                // Swipe right - complete
                                this.completeTask(taskId);
                            }
                        }
                    }, { passive: true });

                    // Long press for details
                    item.addEventListener('touchstart', (e) => {
                        this.touchStartX = e.touches[0].clientX;
                        this.touchStartY = e.touches[0].clientY;
                        
                        this.longPressTimer = setTimeout(() => {
                            if (!isSwiping) {
                                const taskId = parseInt(item.dataset.taskId);
                                this.openDetailsModal(taskId);
                            }
                        }, 600);
                    }, { passive: true });

                    item.addEventListener('touchend', () => {
                        clearTimeout(this.longPressTimer);
                    }, { passive: true });

                    item.addEventListener('touchmove', () => {
                        clearTimeout(this.longPressTimer);
                    }, { passive: true });
                });

                // Setup drag to reorder
                if (this.sortMode) {
                    this.setupDragListeners();
                }
            },

            setupDragListeners() {
                const taskItems = document.querySelectorAll('.task-item');
                let draggedItem = null;
                let placeholder = null;

                taskItems.forEach(item => {
                    item.addEventListener('touchstart', (e) => {
                        const handle = e.target.closest('.drag-handle');
                        if (handle && this.sortMode) {
                            draggedItem = item;
                            item.classList.add('dragging');
                            placeholder = item.cloneNode(true);
                            placeholder.style.opacity = '0.3';
                            item.parentNode.insertBefore(placeholder, item);
                        }
                    }, { passive: true });

                    item.addEventListener('touchmove', (e) => {
                        if (!draggedItem || !this.sortMode) return;
                        
                        const touchX = e.touches[0].clientX;
                        const touchY = e.touches[0].clientY;
                        const rect = item.getBoundingClientRect();
                        
                        if (draggedItem !== item && 
                            touchY > rect.top && touchY < rect.bottom) {
                            if (draggedItem.compareDocumentPosition(item) & 4) {
                                item.parentNode.insertBefore(draggedItem, item);
                            } else {
                                item.parentNode.insertBefore(draggedItem, item.nextSibling);
                            }
                        }
                    }, { passive: true });

                    item.addEventListener('touchend', () => {
                        if (draggedItem && this.sortMode) {
                            draggedItem.classList.remove('dragging');
                            if (placeholder && placeholder.parentNode) {
                                placeholder.parentNode.removeChild(placeholder);
                            }

                            // Update order
                            const items = document.querySelectorAll('.task-item');
                            items.forEach((el, index) => {
                                const taskId = parseInt(el.dataset.taskId);
                                const task = this.tasks.find(t => t.id === taskId);
                                if (task) task.order = index;
                            });
                            this.saveTasks();

                            draggedItem = null;
                            placeholder = null;
                        }
                    }, { passive: true });
                });
            },
            
            render() {
                const tasks = this.getFilteredTasks();
                const list = document.getElementById('taskList');
                
                if (tasks.length === 0) {
                    list.innerHTML = '<div class="empty">No tasks</div>';
                } else {
                    list.innerHTML = tasks.map(task => {
                        const dotClass = task.tags?.[0] ? `dot-${task.tags[0]}` : 'dot-school';
                        const dragHandle = this.sortMode ? '<span class="drag-handle">⋮</span>' : '';
                        return `
                            <div class="task-item" data-task-id="${task.id}" ontouchstart="app.setupSwipeListeners()">
                                ${dragHandle}
                                <div class="task-dot ${dotClass}"></div>
                                <div class="task-content">
                                    <div class="task-name">${task.name}</div>
                                    ${task.notes ? `<div class="task-notes">${task.notes}</div>` : ''}
                                </div>
                                <div class="task-actions">
                                    <button class="btn-action btn-reschedule" onclick="app.openRescheduleModal(${task.id})">Reschedule</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                
                // Update progress
                const progress = this.tasks.filter(t => t.completed && t.date === this.getToday()).length;
                const total = this.tasks.filter(t => t.date === this.getToday()).length;
                document.getElementById('progressFill').style.width = total > 0 ? (progress / total * 100) + '%' : '0%';
                document.getElementById('progressText').textContent = `${progress}/${total}`;

                // Update filter tags
                this.setupTagFilter();

                // Setup swipe listeners
                setTimeout(() => this.setupSwipeListeners(), 0);
            }
        };
        
        app.init();
    </script>
</body>
</html>
