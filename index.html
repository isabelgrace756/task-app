<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Task App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f5e6d3 0%, #f3d5e8 40%, #e8c5f0 70%, #f4a8a8 100%);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(245, 230, 211, 0.95);
            padding: 20px;
            z-index: 40;
            border-bottom: 1px solid rgba(200, 180, 160, 0.3);
        }
        
        .header-top { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .header-title { font-size: 32px; font-family: Georgia, serif; color: #2d2d2d; font-weight: 400; }
        .header-subtitle { color: #666; font-size: 13px; }
        .header-time { text-align: right; font-size: 12px; color: #888; }
        
        .progress-bar {
            height: 8px;
            background: #d4c4b4;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f5a86e 0%, #ec8fc1 50%, #b584d4 100%);
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: #d4c4b4;
            color: #666;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: linear-gradient(90deg, #f5a86e, #ec8fc1);
            color: white;
        }
        
        .content {
            padding-top: 200px;
            padding-left: 20px;
            padding-right: 20px;
        }
        
        .task-item {
            background: #ede8e3;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #c4a894;
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
            margin-top: 2px;
        }
        
        .task-content { flex: 1; min-width: 0; }
        .task-name { color: #2d2d2d; font-weight: 500; font-size: 14px; }
        .task-notes { color: #888; font-size: 12px; margin-top: 3px; }
        
        .task-tag {
            display: inline-block;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .tag-school { background: #f5a86e; color: white; }
        .tag-home { background: #d4b5f0; color: #5a3a7a; }
        .tag-misc { background: #f0b5d4; color: #7a3a5a; }
        
        .add-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffb8a8, #f5a86e);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(245, 168, 110, 0.3);
            z-index: 30;
        }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: flex-end;
            z-index: 50;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            width: 100%;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 28px 24px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-title { font-size: 22px; font-family: Georgia, serif; color: #2d2d2d; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .form-input, .form-textarea { width: 100%; padding: 12px 16px; border-radius: 12px; background: #d4c4b4; border: none; color: #2d2d2d; font-family: inherit; }
        .form-textarea { height: 80px; resize: none; }
        
        .quick-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .quick-tag { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; background: #d4c4b4; color: #666; transition: all 0.2s; }
        .quick-tag.active-school { background: #f5a86e; color: white; }
        .quick-tag.active-home { background: #d4b5f0; color: #5a3a7a; }
        .quick-tag.active-misc { background: #f0b5d4; color: #7a3a5a; }
        
        .modal-buttons { display: flex; gap: 8px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px 16px; border: none; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .btn-cancel { background: #d4c4b4; color: #2d2d2d; }
        .btn-submit { background: linear-gradient(90deg, #f5a86e, #ec8fc1); color: white; }
        
        .empty { text-align: center; padding: 40px 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div>
                <div class="header-title">Hey, Bel.</div>
                <div class="header-subtitle">Whatcha getting up to today?</div>
            </div>
            <div class="header-time">
                <div id="time">8:53 PM</div>
                <div id="date">03.04.26</div>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="app.setView('today')">TODAY</button>
            <button class="tab" onclick="app.setView('scheduled')">SCHEDULED</button>
            <button class="tab" onclick="app.setView('complete')">COMPLETE</button>
        </div>
    </div>
    
    <div class="content">
        <div id="taskList"></div>
    </div>
    
    <button class="add-button" onclick="app.openAddModal()">+</button>
    
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2 class="modal-title">✏️ New Task...</h2>
            <div class="form-group">
                <input type="text" id="taskName" class="form-input" placeholder="Task name">
            </div>
            <div class="form-group">
                <textarea id="taskNotes" class="form-textarea" placeholder="Add notes..."></textarea>
            </div>
            <div class="form-group">
                <div class="quick-tags" id="tagButtons"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Choose a date...</label>
                <input type="date" id="taskDate" class="form-input">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="app.closeAddModal()">Cancel</button>
                <button class="btn-submit" onclick="app.saveTask()">Add Task</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            tasks: [],
            view: 'today',
            selectedTags: [],
            
            init() {
                this.loadTasks();
                this.updateTime();
                this.setupTagButtons();
                setInterval(() => this.updateTime(), 1000);
                setInterval(() => this.render(), 5000);
                this.render();
            },
            
            loadTasks() {
                const saved = localStorage.getItem('tasks');
                this.tasks = saved ? JSON.parse(saved) : this.getDefaultTasks();
            },
            
            getDefaultTasks() {
                return [
                    { id: 1, name: 'Finish exhibition posters', notes: 'due Sunday', tags: ['school'], date: this.getToday(), completed: false },
                    { id: 2, name: 'Order exhibition decals for podium', notes: 'due Sunday', tags: ['school'], date: this.getToday(), completed: false },
                    { id: 3, name: 'Print Denman poster', notes: 'by Saturday', tags: ['school'], date: this.getToday(), completed: false },
                    { id: 4, name: 'PT exercises', notes: 'by tomorrow', tags: ['home'], date: this.getToday(), completed: false },
                ];
            },
            
            getToday() {
                return new Date().toISOString().split('T')[0];
            },
            
            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
                this.render();
            },
            
            setupTagButtons() {
                const container = document.getElementById('tagButtons');
                ['home', 'school', 'misc'].forEach(tag => {
                    const btn = document.createElement('button');
                    btn.className = 'quick-tag';
                    btn.textContent = tag;
                    btn.onclick = () => {
                        btn.classList.toggle(`active-${tag}`);
                    };
                    container.appendChild(btn);
                });
            },
            
            setView(view) {
                this.view = view;
                this.render();
                document.querySelectorAll('.tab').forEach((btn, i) => {
                    btn.classList.toggle('active', (i === 0 && view === 'today') || (i === 1 && view === 'scheduled') || (i === 2 && view === 'complete'));
                });
            },
            
            getFilteredTasks() {
                return this.tasks.filter(t => {
                    if (this.view === 'today') return !t.completed && t.date === this.getToday();
                    if (this.view === 'scheduled') return !t.completed && t.date > this.getToday();
                    if (this.view === 'complete') return t.completed;
                    return true;
                });
            },
            
            completeTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                }
            },
            
            openAddModal() {
                document.getElementById('addModal').classList.add('show');
                document.getElementById('taskDate').value = this.getToday();
            },
            
            closeAddModal() {
                document.getElementById('addModal').classList.remove('show');
            },
            
            saveTask() {
                const name = document.getElementById('taskName').value;
                const notes = document.getElementById('taskNotes').value;
                const date = document.getElementById('taskDate').value;
                const tags = Array.from(document.querySelectorAll('.quick-tag.active-school, .quick-tag.active-home, .quick-tag.active-misc'))
                    .map(btn => btn.textContent);
                
                if (name) {
                    this.tasks.push({
                        id: Date.now(),
                        name,
                        notes,
                        tags,
                        date,
                        completed: false
                    });
                    this.saveTasks();
                    document.getElementById('taskName').value = '';
                    document.getElementById('taskNotes').value = '';
                    this.closeAddModal();
                }
            },
            
            updateTime() {
                const now = new Date();
                document.getElementById('time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('date').textContent = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' });
            },
            
            render() {
                const tasks = this.getFilteredTasks();
                const list = document.getElementById('taskList');
                
                if (tasks.length === 0) {
                    list.innerHTML = '<div class="empty">No tasks</div>';
                    return;
                }
                
                const progress = this.tasks.filter(t => t.completed && t.date === this.getToday()).length;
                const total = this.tasks.filter(t => t.date === this.getToday()).length;
                document.getElementById('progressFill').style.width = total > 0 ? (progress / total * 100) + '%' : '0%';
                
                list.innerHTML = tasks.map(task => `
                    <div class="task-item">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="app.completeTask(${task.id})">
                        <div class="task-content">
                            <div class="task-name">${task.name}</div>
                            ${task.notes ? `<div class="task-notes">${task.notes}</div>` : ''}
                        </div>
                        ${task.tags ? task.tags.map(tag => `<span class="task-tag tag-${tag}">${tag}</span>`).join('') : ''}
                    </div>
                `).join('');
            }
        };
        
        app.init();
    </script>
</body>
</html>
