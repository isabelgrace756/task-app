<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#f0ece3"/>
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0ece3;--card:#faf8f4;--beige:#e8e2d8;--beige2:#e0d9cc;
  --text:#2a2520;--sub:#9a9186;--muted:#c8bfaf;--border:#d8d0c4;
  --orange:#f06030;--purple:#9070c8;--coral:#f07850;
  --glass:rgba(250,248,244,0.72);--glass-border:rgba(216,208,196,0.5);
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--text);-webkit-font-smoothing:antialiased}
input,textarea,button,select{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

.gradient-mesh{
  position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);
  width:380px;height:380px;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle at 30% 50%,rgba(240,96,48,0.55) 0%,transparent 55%),
             radial-gradient(circle at 70% 40%,rgba(144,112,200,0.45) 0%,transparent 50%),
             radial-gradient(circle at 50% 70%,rgba(240,120,80,0.4) 0%,transparent 50%);
  filter:blur(40px);
}

.header{padding:48px 28px 18px;position:relative;z-index:2}
.header-row{display:flex;justify-content:space-between;align-items:flex-start}
.greeting{font-family:var(--serif);font-size:42px;font-weight:400;line-height:1.05}
.subgreeting{font-size:13px;color:var(--sub);margin-top:5px;font-weight:300;letter-spacing:0.2px}
.clock{text-align:right;padding-top:8px;flex-shrink:0}
.clock-time{font-size:17px;font-weight:600;letter-spacing:0.5px}
.clock-date{font-size:12px;color:var(--sub);margin-top:2px;letter-spacing:1px}
.settings-gear{position:absolute;top:52px;right:28px;cursor:pointer;opacity:0.3;transition:opacity 0.2s;background:none;border:none;padding:0}
.settings-gear:hover{opacity:0.6}
.settings-gear svg{width:18px;height:18px}

.glass-container{
  flex:1;margin:0 14px 0;position:relative;z-index:2;display:flex;flex-direction:column;min-height:0;
  background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden;
}

.tabs{margin:14px 14px 0;background:var(--beige2);border-radius:100px;padding:3px;display:flex}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:100px;cursor:pointer;color:var(--sub);transition:all 0.25s;user-select:none}
.tab.active{background:linear-gradient(135deg,var(--orange) 0%,var(--purple) 100%);color:white;box-shadow:0 2px 12px rgba(144,112,200,0.3)}

.progress-wrap{margin:12px 14px 0}
.progress-bar{background:var(--beige2);border-radius:100px;height:26px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--orange) 0%,#b090e0 100%);transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);min-width:4%}
.progress-label{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:white;letter-spacing:0.5px;text-shadow:0 1px 3px rgba(0,0,0,0.15);white-space:nowrap;text-transform:uppercase}

.filter-row{display:flex;align-items:center;gap:8px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none}
.cat-pill{padding:6px 16px;border-radius:100px;font-size:13px;cursor:pointer;border:1.5px solid var(--muted);background:transparent;color:#8a8278;transition:all 0.2s;user-select:none;flex-shrink:0}
.cat-pill.active{border:none;color:white}
.sort-btn{margin-left:auto;padding:6px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--muted);background:transparent;color:#8a8278;transition:all 0.2s;user-select:none;flex-shrink:0}
.sort-btn.active{border-color:var(--orange);color:var(--orange)}

.swipe-hint{text-align:center;font-size:11px;color:var(--muted);padding:8px 0 4px;letter-spacing:0.3px}

.task-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 14px 100px}

.task-card-wrap{position:relative;margin-bottom:8px;border-radius:16px;overflow:visible}
.swipe-bg{position:absolute;inset:0;border-radius:16px;display:flex;align-items:center;padding:0 20px;color:white;font-size:11px;font-weight:700;letter-spacing:0.5px;transition:opacity 0.15s}
.swipe-bg.left{background:#70b080;justify-content:flex-end}
.swipe-bg.right{background:var(--orange);justify-content:flex-start}

.task-card{background:var(--card);border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;cursor:grab;user-select:none;touch-action:pan-y;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);position:relative}
.task-card.dragging{transition:none}
.task-card.flying-left{transform:translateX(-120%)!important;opacity:0;transition:transform 0.3s ease,opacity 0.3s ease}
.task-card.flying-right{transform:translateX(120%)!important;opacity:0;transition:transform 0.3s ease,opacity 0.3s ease}

.task-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.task-info{flex:1;min-width:0}
.task-title{font-size:15px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-title.done{color:var(--sub);text-decoration:line-through}
.task-notes{font-size:12px;color:#b0a898;margin-top:1px;font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{display:flex;gap:8px;margin-top:3px;align-items:center;flex-wrap:wrap}
.task-due{font-size:11px;color:var(--sub);font-weight:300}
.task-repeat{font-size:11px;color:var(--purple);font-weight:600}
.task-reminder{font-size:11px;color:var(--coral);font-weight:600}
.task-badge{font-size:11px;padding:4px 12px;border-radius:100px;background:var(--beige);color:#8a8278;font-weight:500;flex-shrink:0}

.sort-wrap{position:relative}
.sort-grip{position:absolute;right:6px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:2px;cursor:grab;padding:8px 6px;z-index:5;touch-action:none}
.sort-grip span{display:block;width:14px;height:2px;background:var(--muted);border-radius:1px}
.sort-ghost{opacity:0.35;pointer-events:none}
.sort-mark{box-shadow:0 -3px 0 0 var(--orange)}

.group-header{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);padding:10px 4px 6px}
.empty-state{text-align:center;padding:48px 20px;color:var(--sub)}
.empty-state .emoji{font-size:32px;margin-bottom:10px}
.empty-state .msg{font-size:14px}

.fab{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:66px;height:66px;border-radius:50%;border:1px solid rgba(255,255,255,0.35);cursor:pointer;z-index:15;padding:0;background:rgba(250,245,238,0.45);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(144,112,200,0.2),0 2px 8px rgba(240,96,48,0.1),inset 0 1px 0 rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;transition:box-shadow 0.3s}
.fab svg{width:28px;height:28px;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1)}
.fab.open svg{transform:rotate(135deg)}

.modal-overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:flex-end;justify-content:center;padding:0 16px 90px;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-backdrop{position:absolute;inset:0;background:rgba(42,37,32,0.2);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.modal-card{position:relative;z-index:1;background:rgba(250,248,244,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(216,208,196,0.45);border-radius:22px;padding:22px 22px 28px;width:100%;max-height:65dvh;overflow-y:auto;box-shadow:0 8px 40px rgba(42,37,32,0.1);transform:translateY(30px) scale(0.97);opacity:0;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s}
.modal-card::-webkit-scrollbar{display:none}
.modal-overlay.open .modal-card{transform:translateY(0) scale(1);opacity:1}
.modal-title-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.modal-pencil{font-size:18px;color:var(--sub)}
.modal-title-input{flex:1;background:transparent;border:none;font-size:22px;font-weight:400;color:var(--text)}
.modal-title-input::placeholder{color:var(--muted)}
.modal-notes{width:100%;background:var(--beige);border:none;border-radius:12px;padding:13px 16px;font-size:14px;color:var(--text);resize:none;margin-bottom:16px}
.modal-notes::placeholder{color:var(--sub)}
.modal-cats{display:flex;gap:8px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.modal-cat-pill{padding:6px 16px;border-radius:100px;font-size:13px;cursor:pointer;border:1.5px solid var(--muted);background:transparent;color:#8a8278;transition:all 0.2s;position:relative}
.modal-cat-pill.sel{border:none;color:white}
.modal-cat-delete{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--text);color:white;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.modal-add-cat{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--muted);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.new-cat-input{background:var(--beige);border:none;border-radius:100px;padding:6px 14px;font-size:13px;width:100px;color:var(--text)}
.cal-strip{display:flex;gap:6px;justify-content:center;flex:1}
.cal-day{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px 10px;border-radius:14px;cursor:pointer;min-width:52px;transition:all 0.2s}
.cal-day .day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--sub)}
.cal-day .day-num{font-size:22px;font-weight:500;color:var(--text)}
.cal-day.selected{background:var(--orange)}
.cal-day.selected .day-name,.cal-day.selected .day-num{color:white}
.quick-pills{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.quick-pill{padding:6px 14px;border-radius:100px;font-size:12px;cursor:pointer;border:1.5px solid var(--muted);background:transparent;color:var(--coral);transition:all 0.2s;white-space:nowrap;flex-shrink:0;font-weight:500}
.quick-pill.active{background:var(--coral);color:white;border-color:var(--coral)}
.field-row{display:flex;gap:20px;margin-bottom:12px;align-items:flex-start;flex-wrap:wrap}
.field-col{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:12px;color:var(--sub);font-weight:500}
.field-value{padding:8px 14px;border-radius:100px;background:var(--beige);font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap}
.field-input{padding:8px 14px;border-radius:100px;background:var(--beige);font-size:13px;color:var(--text);border:none}
.modal-save-btn{width:100%;padding:14px;border-radius:100px;border:none;margin-top:8px;background:linear-gradient(135deg,var(--orange) 0%,var(--purple) 100%);color:white;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(144,112,200,0.3)}

.settings-overlay{position:absolute;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s}
.settings-overlay.open{opacity:1;pointer-events:all}
.settings-card{position:relative;z-index:1;background:var(--card);border-radius:22px;padding:24px;width:100%;box-shadow:0 8px 40px rgba(42,37,32,0.15);transform:scale(0.96);opacity:0;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s}
.settings-overlay.open .settings-card{transform:scale(1);opacity:1}
.settings-title{font-family:var(--serif);font-size:24px;margin-bottom:16px}
.settings-label{font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:14px}
.settings-input{width:100%;padding:10px 14px;border-radius:12px;background:var(--beige);border:none;font-size:13px;color:var(--text)}
.settings-btn{margin-top:18px;width:100%;padding:13px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--orange) 0%,var(--purple) 100%);color:white;font-size:14px;font-weight:600;cursor:pointer}
.settings-btn.secondary{background:var(--beige);color:var(--text);margin-top:8px}
.settings-status{font-size:12px;color:var(--sub);margin-top:8px;text-align:center}
.settings-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;color:var(--sub);cursor:pointer}

.toast{position:absolute;bottom:96px;left:50%;background:var(--text);color:white;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;white-space:nowrap;z-index:30;opacity:0;transform:translateX(-50%) translateY(14px);transition:opacity 0.3s,transform 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

const DEFAULT_CATS = [
  { name: "home", color: "#f06030" },
  { name: "school", color: "#9070c8" },
  { name: "misc", color: "#c8a088" },
];
const PALETTE = ["#f06030","#9070c8","#c8a088","#6090c8","#e0a040","#70b080","#d06080","#80b0b0","#b08060","#a080d0"];

const INITIAL_TASKS = [
  { id:"t1",title:"Finish exhibition posters",cat:"school",due:"2026-04-06",status:"today",notes:"",repeat:"never",reminder:"none" },
  { id:"t2",title:"Order exhibition decals for podium",cat:"school",due:"2026-04-06",status:"today",notes:"",repeat:"never",reminder:"none" },
  { id:"t3",title:"Print Denman poster",cat:"school",due:"2026-04-07",status:"today",notes:"Check with print shop on size",repeat:"never",reminder:"15 min" },
  { id:"t4",title:"PT exercises",cat:"home",due:"2026-04-06",status:"today",notes:"",repeat:"daily",reminder:"none" },
  { id:"t5",title:"Reply to Kristen's email",cat:"misc",due:"2026-04-05",status:"today",notes:"",repeat:"never",reminder:"at time" },
  { id:"t6",title:"Lab meeting agenda",cat:"school",due:"2026-04-10",status:"scheduled",notes:"",repeat:"weekly",reminder:"1 hour" },
  { id:"t7",title:"Water plants",cat:"home",due:"2026-04-11",status:"scheduled",notes:"",repeat:"weekly",reminder:"none" },
  { id:"t8",title:"Manuscript revisions",cat:"school",due:"2026-04-13",status:"scheduled",notes:"Focus on discussion section",repeat:"never",reminder:"1 day" },
  { id:"t9",title:"Pick up film rolls",cat:"misc",due:"2026-04-11",status:"scheduled",notes:"",repeat:"never",reminder:"none" },
  { id:"t10",title:"Vacuum the apartment",cat:"home",due:"2026-03-28",status:"complete",notes:"",repeat:"never",reminder:"none" },
  { id:"t11",title:"Submitted SAS abstract",cat:"school",due:"2026-03-28",status:"complete",notes:"",repeat:"never",reminder:"none" },
];

const uid = () => "t" + Math.random().toString(36).slice(2, 9);
const SK = "bel_tasks_v2";
function loadLocal(){ try { const d = JSON.parse(localStorage.getItem(SK)); if(d?.tasks) return d; } catch{} return null; }
function saveLocal(tasks,cats,gh){ try { localStorage.setItem(SK, JSON.stringify({tasks,cats,gh,ts:Date.now()})); } catch{} }

async function ghLoad(c){ if(!c.gistId||!c.token) return null; try { const r=await fetch(`https://api.github.com/gists/${c.gistId}`,{headers:{Authorization:`token ${c.token}`}}); if(!r.ok) return null; const g=await r.json(); const f=g.files?.["tasks.json"]; return f ? JSON.parse(f.content) : null; } catch{ return null; } }
async function ghSave(c,tasks,cats){ if(!c.gistId||!c.token) return false; try { const r=await fetch(`https://api.github.com/gists/${c.gistId}`,{method:"PATCH",headers:{Authorization:`token ${c.token}`,"Content-Type":"application/json"},body:JSON.stringify({files:{"tasks.json":{content:JSON.stringify({tasks,cats,ts:Date.now()},null,2)}}})}); return r.ok; } catch{ return false; } }

const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DSHORT=["SUN","MON","TUES","WED","THURS","FRI","SAT"];
function toISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function fmtShort(iso){ if(!iso) return ""; const d=new Date(iso+"T12:00:00"),now=new Date();now.setHours(12,0,0,0); const diff=Math.round((d-now)/864e5); if(diff===0) return "today"; if(diff===1) return "tomorrow"; if(diff===-1) return "yesterday"; if(diff>1&&diff<=6) return DSHORT[d.getDay()].toLowerCase(); return `${MONTHS[d.getMonth()]} ${d.getDate()}`; }
function dueBucket(iso){ if(!iso) return "sometime"; const d=new Date(iso+"T12:00:00"),now=new Date();now.setHours(12,0,0,0); const diff=Math.round((d-now)/864e5); if(diff<0) return "overdue"; if(diff===0) return "today"; if(diff===1) return "tomorrow"; if(diff<=7) return "this week"; if(diff<=14) return "next week"; return `${MONTHS[new Date(iso+"T12:00:00").getMonth()]} ${new Date(iso+"T12:00:00").getDate()}`; }
function getCalDays(center){ const days=[]; for(let i=-2;i<=2;i++){ const d=new Date(center); d.setDate(d.getDate()+i); days.push({name:DSHORT[d.getDay()],num:String(d.getDate()).padStart(2,"0"),iso:toISO(d)}); } return days; }

function useClock(){ const[now,setNow]=useState(new Date()); useEffect(()=>{ const t=setInterval(()=>setNow(new Date()),10000); return()=>clearInterval(t); },[]); const h=now.getHours()%12||12; return { time:`${h}:${String(now.getMinutes()).padStart(2,"0")}  ${now.getHours()>=12?"PM":"AM"}`, date:`${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")}.${String(now.getFullYear()).slice(2)}` }; }

/* ═══ TaskCard ═══ */
function TaskCard({task,cats,onSwipeLeft,onSwipeRight,leftLabel,rightLabel,sortMode,onLongPress}){
  const[dx,setDx]=useState(0);const[flying,setFlying]=useState(null);
  const sx=useRef(null),drag=useRef(false),cardRef=useRef(null),lpT=useRef(null),didLP=useRef(false);
  const TH=80;
  const onPD=e=>{if(sortMode)return;sx.current=e.clientX;drag.current=false;didLP.current=false;cardRef.current?.setPointerCapture(e.pointerId);lpT.current=setTimeout(()=>{didLP.current=true;onLongPress?.()},500)};
  const onPM=e=>{if(sortMode||sx.current===null)return;const d=e.clientX-sx.current;if(!drag.current&&Math.abs(d)>5){drag.current=true;clearTimeout(lpT.current)}if(drag.current)setDx(d)};
  const onPU=()=>{clearTimeout(lpT.current);if(sortMode)return;if(didLP.current){sx.current=null;return}if(!drag.current){setDx(0);sx.current=null;return}sx.current=null;if(dx<-TH){setFlying("left");setTimeout(()=>onSwipeLeft(),300)}else if(dx>TH){setFlying("right");setTimeout(()=>onSwipeRight(),300)}else setDx(0);drag.current=false};
  const pct=Math.min(Math.abs(dx)/TH,1);
  const co=cats.find(c=>c.name===task.cat)||{color:"#c8bfaf"};
  const dot=task.status==="complete"?{background:"none",border:"2px solid var(--muted)"}:{background:co.color,boxShadow:`0 0 0 3px ${co.color}1f`};
  return(
    <div className="task-card-wrap">
      {!sortMode&&<><div className="swipe-bg left" style={{opacity:dx<-10?pct:0}}>{leftLabel}</div><div className="swipe-bg right" style={{opacity:dx>10?pct:0}}>{rightLabel}</div></>}
      <div ref={cardRef} className={`task-card${drag.current?" dragging":""}${flying==="left"?" flying-left":""}${flying==="right"?" flying-right":""}`} onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU} onPointerCancel={onPU} style={{transform:!flying?`translateX(${sortMode?0:dx}px)`:undefined}}>
        <div className="task-dot" style={dot}/>
        <div className="task-info">
          <div className={`task-title${task.status==="complete"?" done":""}`}>{task.title}</div>
          {task.notes&&<div className="task-notes">{task.notes}</div>}
          <div className="task-meta">
            {task.due&&<span className="task-due">{task.status==="complete"?"done ✓":`by ${fmtShort(task.due)}`}</span>}
            {task.repeat&&task.repeat!=="never"&&<span className="task-repeat">↺ {task.repeat}</span>}
            {task.reminder&&task.reminder!=="none"&&<span className="task-reminder">🔔 {task.reminder}</span>}
          </div>
        </div>
        <div className="task-badge">{task.cat}</div>
      </div>
    </div>
  );
}

/* ═══ Modal ═══ */
function Modal({open,onClose,onSubmit,editTask,mode,cats,onAddCat,onDeleteCat}){
  const[title,setTitle]=useState("");const[notes,setNotes]=useState("");const[cat,setCat]=useState("home");
  const[dueISO,setDueISO]=useState(toISO(new Date()));const[repeat,setRepeat]=useState("never");
  const[reminder,setReminder]=useState("none");const[calCenter,setCalCenter]=useState(new Date());
  const[quickPick,setQuickPick]=useState("today");const[addingCat,setAddingCat]=useState(false);const[newCatName,setNewCatName]=useState("");

  useEffect(()=>{
    if(!open)return;
    if(editTask){setTitle(editTask.title);setNotes(editTask.notes||"");setCat(editTask.cat);setDueISO(editTask.due||toISO(new Date()));setRepeat(editTask.repeat||"never");setReminder(editTask.reminder||"none");setQuickPick("");setCalCenter(editTask.due?new Date(editTask.due+"T12:00:00"):new Date())}
    else{const t=new Date();setTitle("");setNotes("");setCat(cats[0]?.name||"misc");setDueISO(toISO(t));setRepeat("never");setReminder("none");setQuickPick("today");setCalCenter(t)}
    setAddingCat(false);setNewCatName("");
  },[open,editTask]);

  const calDays=getCalDays(calCenter);
  const pickQuick=label=>{setQuickPick(label);const t=new Date();t.setHours(12,0,0,0);const d=new Date(t);if(label==="tomorrow")d.setDate(d.getDate()+1);else if(label==="this weekend"){const dy=d.getDay();d.setDate(d.getDate()+(6-dy))}else if(label==="monday"){const dy=d.getDay();d.setDate(d.getDate()+((8-dy)%7||7))}else if(label==="next week")d.setDate(d.getDate()+7);setDueISO(toISO(d));setCalCenter(d)};
  const pickDay=iso=>{setDueISO(iso);setQuickPick("")};
  const shiftCal=dir=>{const d=new Date(calCenter);d.setDate(d.getDate()+dir*5);setCalCenter(d)};
  const submit=()=>{if(mode!=="reschedule"&&!title.trim())return;onSubmit({title:mode==="reschedule"?editTask.title:title.trim(),notes:mode==="reschedule"?editTask.notes:notes,cat:mode==="reschedule"?editTask.cat:cat,due:dueISO,repeat,reminder,editId:editTask?.id,reschedule:mode==="reschedule"})};
  const addCatSubmit=()=>{const n=newCatName.trim().toLowerCase();if(!n||cats.find(c=>c.name===n))return;const used=cats.map(c=>c.color);const color=PALETTE.find(p=>!used.includes(p))||PALETTE[cats.length%PALETTE.length];onAddCat({name:n,color});setCat(n);setAddingCat(false);setNewCatName("")};
  const isR=mode==="reschedule";

  return(
    <div className={`modal-overlay${open?" open":""}`}>
      <div className="modal-backdrop" onClick={onClose}/>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        {!isR&&<>
          <div className="modal-title-row"><span className="modal-pencil">✎</span><input className="modal-title-input" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="New Task..."/></div>
          <textarea className="modal-notes" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Add notes..." rows={2}/>
          <div className="modal-cats">
            {cats.map(c=><div key={c.name} className={`modal-cat-pill${cat===c.name?" sel":""}`} style={cat===c.name?{background:c.color}:{}} onClick={()=>setCat(c.name)}>{c.name}{cat===c.name&&cats.length>1&&<div className="modal-cat-delete" onClick={e=>{e.stopPropagation();onDeleteCat(c.name);setCat(cats.find(x=>x.name!==c.name)?.name||"")}}>×</div>}</div>)}
            {addingCat?<input className="new-cat-input" value={newCatName} onChange={e=>setNewCatName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addCatSubmit();if(e.key==="Escape")setAddingCat(false)}} onBlur={()=>{if(newCatName.trim())addCatSubmit();else setAddingCat(false)}} autoFocus placeholder="tag name"/>:<button className="modal-add-cat" onClick={()=>setAddingCat(true)}>+</button>}
          </div>
        </>}
        {isR&&<div style={{marginBottom:14}}><div style={{fontFamily:"var(--serif)",fontSize:20,marginBottom:4}}>Reschedule</div><div style={{fontSize:14,color:"var(--sub)"}}>{editTask?.title}</div></div>}

        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:16}}>
          <div onClick={()=>shiftCal(-1)} style={{cursor:"pointer",padding:"4px 6px",color:"var(--sub)",fontSize:18,userSelect:"none"}}>‹</div>
          <div className="cal-strip">
            {calDays.map(d=><div key={d.iso} className={`cal-day${dueISO===d.iso?" selected":""}`} onClick={()=>pickDay(d.iso)}><span className="day-name">{d.name}</span><span className="day-num">{d.num}</span></div>)}
          </div>
          <div onClick={()=>shiftCal(1)} style={{cursor:"pointer",padding:"4px 6px",color:"var(--sub)",fontSize:18,userSelect:"none"}}>›</div>
        </div>

        <div className="quick-pills">
          {["today","tomorrow","this weekend","monday","next week"].map(w=><div key={w} className={`quick-pill${quickPick===w?" active":""}`} onClick={()=>pickQuick(w)}>{w}</div>)}
        </div>

        <div className="field-row">
          <div className="field-col"><span className="field-label">Pick a date</span><input type="date" className="field-input" value={dueISO} onChange={e=>{setDueISO(e.target.value);setQuickPick("");setCalCenter(new Date(e.target.value+"T12:00:00"))}}/></div>
          <div className="field-col"><span className="field-label">Repeat?</span><div className="field-value" onClick={()=>{const o=["never","daily","weekdays","weekly","biweekly","monthly"];setRepeat(o[(o.indexOf(repeat)+1)%o.length])}}>{repeat==="never"?"Never":repeat}</div></div>
        </div>
        <div className="field-row" style={{marginBottom:6}}>
          <div className="field-col"><span className="field-label">Reminder</span><div className="field-value" onClick={()=>{const o=["none","at time","5 min","15 min","30 min","1 hour","1 day"];setReminder(o[(o.indexOf(reminder)+1)%o.length])}}>{reminder==="none"?"None":reminder}</div></div>
        </div>
        <button className="modal-save-btn" onClick={submit}>{isR?"Reschedule":editTask?"Save Changes":"Add Task"}</button>
      </div>
    </div>
  );
}

/* ═══ Settings ═══ */
function Settings({open,onClose,ghConfig,setGhConfig,onSync,syncStatus}){
  const[gist,setGist]=useState(ghConfig.gistId);const[token,setToken]=useState(ghConfig.token);
  useEffect(()=>{setGist(ghConfig.gistId);setToken(ghConfig.token)},[ghConfig]);
  return(
    <div className={`settings-overlay${open?" open":""}`}>
      <div className="modal-backdrop" onClick={onClose}/>
      <div className="settings-card" onClick={e=>e.stopPropagation()}>
        <button className="settings-close" onClick={onClose}>×</button>
        <div className="settings-title">Settings</div>
        <div className="settings-label">GitHub Gist ID</div>
        <input className="settings-input" value={gist} onChange={e=>setGist(e.target.value)} placeholder="e.g. abc123def456..."/>
        <div className="settings-label">Personal Access Token</div>
        <input className="settings-input" type="password" value={token} onChange={e=>setToken(e.target.value)} placeholder="ghp_..."/>
        <div style={{fontSize:11,color:"var(--sub)",marginTop:8,lineHeight:1.5}}>Create a Gist at <strong>gist.github.com</strong> with a file named <strong>tasks.json</strong>. Generate a PAT with <strong>gist</strong> scope at github.com/settings/tokens.</div>
        <button className="settings-btn" onClick={()=>{setGhConfig({gistId:gist.trim(),token:token.trim()});onClose()}}>Save Config</button>
        <button className="settings-btn secondary" onClick={onSync}>Sync Now</button>
        {syncStatus&&<div className="settings-status">{syncStatus}</div>}
      </div>
    </div>
  );
}

/* ═══ App ═══ */
function App(){
  const saved=useRef(loadLocal());
  const[tasks,setTasks]=useState(saved.current?.tasks||INITIAL_TASKS);
  const[cats,setCats]=useState(saved.current?.cats||DEFAULT_CATS);
  const[ghConfig,setGhConfig]=useState(saved.current?.gh||{gistId:"",token:""});
  const[tab,setTab]=useState("today");const[catFilter,setCatFilter]=useState("all");
  const[modalOpen,setModalOpen]=useState(false);const[modalMode,setModalMode]=useState("new");
  const[editTask,setEditTask]=useState(null);const[sortMode,setSortMode]=useState(false);
  const[settingsOpen,setSettingsOpen]=useState(false);const[syncStatus,setSyncStatus]=useState("");
  const[toast,setToast]=useState(null);const toastT=useRef(null);
  const{time,date}=useClock();
  const listRef=useRef(null);

  useEffect(()=>{saveLocal(tasks,cats,ghConfig)},[tasks,cats,ghConfig]);
  useEffect(()=>{if(ghConfig.gistId&&ghConfig.token) ghLoad(ghConfig).then(d=>{if(d?.tasks){setTasks(d.tasks);if(d.cats)setCats(d.cats)}})},[]); // load on mount

  const showToast=useCallback(msg=>{setToast(msg);clearTimeout(toastT.current);toastT.current=setTimeout(()=>setToast(null),2200)},[]);
  const syncNow=async()=>{setSyncStatus("Syncing...");const ok=await ghSave(ghConfig,tasks,cats);setSyncStatus(ok?"✓ Synced!":"✕ Failed");if(ok)showToast("✓ Synced");setTimeout(()=>setSyncStatus(""),3000)};

  // Auto-sync every 2 min
  useEffect(()=>{if(!ghConfig.gistId||!ghConfig.token)return;const t=setInterval(()=>ghSave(ghConfig,tasks,cats),120000);return()=>clearInterval(t)},[ghConfig,tasks,cats]);

  const mutate=useCallback((id,action)=>{
    setTasks(prev=>{const next=prev.map(t=>({...t}));const idx=next.findIndex(t=>t.id===id);if(idx===-1)return prev;
    if(action==="complete"){next[idx].status="complete";showToast("✓ Complete")}
    if(action==="schedule"){next[idx].status="scheduled";showToast("→ Scheduled")}
    if(action==="today"){next[idx].status="today";showToast("↩ Today")}
    if(action==="delete"){next.splice(idx,1);showToast("✕ Deleted")}
    return next});
  },[showToast]);

  const handleSubmit=({title,notes,cat,due,repeat,reminder,editId,reschedule})=>{
    if(editId){setTasks(prev=>prev.map(t=>t.id===editId?{...t,...(reschedule?{due,repeat,reminder}:{title,notes,cat,due,repeat,reminder})}:t));showToast(reschedule?"✓ Rescheduled":"✓ Updated")}
    else{const today=toISO(new Date());const status=due<=today?"today":"scheduled";setTasks(prev=>[{id:uid(),title,notes,cat,due,repeat,reminder,status},...prev]);setTab(status);showToast("✓ Added")}
    setModalOpen(false);setEditTask(null);
  };

  const openNew=()=>{setEditTask(null);setModalMode("new");setModalOpen(true)};
  const openEdit=task=>{setEditTask(task);setModalMode("edit");setModalOpen(true)};
  const openReschedule=task=>{setEditTask(task);setModalMode("reschedule");setModalOpen(true)};
  const closeModal=()=>{setModalOpen(false);setEditTask(null)};
  const addCat=c=>setCats(prev=>[...prev,c]);
  const deleteCat=name=>{setCats(prev=>prev.filter(c=>c.name!==name));setTasks(prev=>prev.map(t=>t.cat===name?{...t,cat:cats.find(c=>c.name!==name)?.name||"misc"}:t));if(catFilter===name)setCatFilter("all")};

  const visible=tasks.filter(t=>t.status===tab&&(catFilter==="all"||t.cat===catFilter));
  const todayDone=tasks.filter(t=>t.status==="complete").length;
  const todayTotal=tasks.filter(t=>t.status==="today"||t.status==="complete").length;
  const pct=todayTotal>0?Math.round((todayDone/todayTotal)*100):0;

  const swipeLabels={today:{left:"✓ Complete",right:"→ Reschedule"},scheduled:{left:"← To Today",right:"✕ Delete"},complete:{left:"✕ Delete",right:"↩ Restore"}};
  const doLeft=id=>{if(tab==="today")mutate(id,"complete");else if(tab==="scheduled")mutate(id,"today");else mutate(id,"delete")};
  const doRight=id=>{if(tab==="today"){const t=tasks.find(x=>x.id===id);if(t)openReschedule(t)}else if(tab==="scheduled")mutate(id,"delete");else mutate(id,"today")};

  const groups=useMemo(()=>{if(tab!=="scheduled")return{};const g={};visible.forEach(t=>{const k=dueBucket(t.due);if(!g[k])g[k]=[];g[k].push(t)});return g},[tab,visible]);

  // ── Sort drag ──
  const[dragId,setDragId]=useState(null);const[dragOverId,setDragOverId]=useState(null);
  const cardRects=useRef({});

  const onSortStart=taskId=>e=>{
    e.preventDefault();setDragId(taskId);
    if(listRef.current){const els=listRef.current.querySelectorAll("[data-tid]");els.forEach(el=>{cardRects.current[el.dataset.tid]=el.getBoundingClientRect()})}
    const onMove=me=>{const y=me.clientY||(me.touches?.[0]?.clientY);let best=null,bestD=Infinity;for(const[id,rect] of Object.entries(cardRects.current)){const mid=rect.top+rect.height/2;const dist=Math.abs(y-mid);if(dist<bestD){bestD=dist;best=id}}setDragOverId(best)};
    const onUp=()=>{document.removeEventListener("pointermove",onMove);document.removeEventListener("pointerup",onUp);
      setDragId(did=>{setDragOverId(oid=>{if(did&&oid&&did!==oid){setTasks(prev=>{const n=[...prev];const fi=n.findIndex(x=>x.id===did);const ti=n.findIndex(x=>x.id===oid);if(fi===-1||ti===-1)return prev;const[item]=n.splice(fi,1);n.splice(ti,0,item);return n})}return null});return null})};
    document.addEventListener("pointermove",onMove);document.addEventListener("pointerup",onUp);
  };

  const renderCards=list=>list.map(t=>(
    <div key={t.id} data-tid={t.id} className={`sort-wrap${dragId===t.id?" sort-ghost":""}${dragOverId===t.id&&dragId!==t.id?" sort-mark":""}`} style={{position:"relative"}}>
      <TaskCard task={t} cats={cats} leftLabel={swipeLabels[tab].left} rightLabel={swipeLabels[tab].right} onSwipeLeft={()=>doLeft(t.id)} onSwipeRight={()=>doRight(t.id)} sortMode={sortMode} onLongPress={()=>openEdit(t)}/>
      {sortMode&&<div className="sort-grip" onPointerDown={onSortStart(t.id)}><span/><span/><span/></div>}
    </div>
  ));

  return(
    <div className="app">
      <div className="gradient-mesh"/>
      <div className="header">
        <div className="header-row">
          <div><div className="greeting">Hey, Bel.</div><div className="subgreeting">Whatcha getting up to today?</div></div>
          <div className="clock"><div className="clock-time">{time}</div><div className="clock-date">{date}</div></div>
        </div>
        <button className="settings-gear" onClick={()=>setSettingsOpen(true)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      </div>

      <div className="glass-container">
        <div className="tabs">{["complete","today","scheduled"].map(t=><div key={t} className={`tab${tab===t?" active":""}`} onClick={()=>{setTab(t);setSortMode(false)}}>{t}</div>)}</div>
        {tab==="today"&&<div className="progress-wrap"><div className="progress-bar"><div className="progress-fill" style={{width:`${Math.max(pct,4)}%`}}/><span className="progress-label">{todayDone}/{todayTotal} done today</span></div></div>}

        <div className="filter-row">
          <div className={`cat-pill${catFilter==="all"?" active":""}`} style={catFilter==="all"?{background:"var(--orange)"}:{}} onClick={()=>setCatFilter("all")}>all</div>
          {cats.map(c=><div key={c.name} className={`cat-pill${catFilter===c.name?" active":""}`} style={catFilter===c.name?{background:c.color,borderColor:c.color}:{}} onClick={()=>setCatFilter(c.name)}>{c.name}</div>)}
          <button className={`sort-btn${sortMode?" active":""}`} onClick={()=>setSortMode(s=>!s)}>SORT</button>
        </div>

        {!sortMode&&<div className="swipe-hint">{tab==="today"&&"← complete · reschedule →"}{tab==="scheduled"&&"← to today · delete →"}{tab==="complete"&&"← delete · restore →"}</div>}
        {sortMode&&<div className="swipe-hint">drag to reorder</div>}

        <div className="task-list" ref={listRef}>
          {visible.length===0&&<div className="empty-state"><div className="emoji">{tab==="complete"?"🎉":"✨"}</div><div className="msg">{tab==="complete"?"Nothing completed yet":tab==="today"?"All clear for today!":"Nothing scheduled"}</div></div>}
          {tab==="scheduled"?Object.entries(groups).map(([due,gt])=><div key={due}><div className="group-header">{due}</div>{renderCards(gt)}</div>):renderCards(visible)}
        </div>
      </div>

      <button className={`fab${modalOpen?" open":""}`} onClick={()=>{if(modalOpen)closeModal();else openNew()}}><svg viewBox="0 0 24 24" fill="none" stroke="rgba(180,140,100,0.55)" strokeWidth="2.2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

      <Modal open={modalOpen} onClose={closeModal} onSubmit={handleSubmit} editTask={editTask} mode={modalMode} cats={cats} onAddCat={addCat} onDeleteCat={deleteCat}/>
      <Settings open={settingsOpen} onClose={()=>setSettingsOpen(false)} ghConfig={ghConfig} setGhConfig={setGhConfig} onSync={syncNow} syncStatus={syncStatus}/>
      <div className={`toast${toast?" show":""}`}>{toast}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
